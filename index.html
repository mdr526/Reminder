<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c6cf0">
<title>یادآور</title>
<link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="یادآور">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin:0; padding:0;
    font-family:'Vazirmatn',Tahoma,sans-serif;
    background: linear-gradient(145deg,#1a103d 0%,#0f1f3d 40%,#0a2a3a 100%);
    min-height:100vh; color:#fff;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-feature-settings:"ss01" on; letter-spacing:0;
  }
  .wrap { max-width:480px; margin:0 auto; padding:20px 16px 90px; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:24px; padding-top:10px; }
  .logo-img { width:52px; height:52px; border-radius:16px; object-fit:cover; box-shadow:0 6px 20px rgba(0,0,0,.4); display:block; outline:none; border:none; }
  .header h1 {
    font-size:22px; margin:0; font-weight:800;
    background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  /* CARD */
  .card {
    border-radius:24px; padding:20px; margin-bottom:20px;
    background:rgba(255,255,255,.09);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 20px 60px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
  }
  .field { margin-bottom:16px; }
  .field:last-child { margin-bottom:0; }
  .field label {
    display:block; font-size:12.5px; font-weight:700;
    color:rgba(255,255,255,.55); margin-bottom:8px; padding-right:2px;
  }

  /* INPUT WITH ICON */
  .input-wrap { position:relative; }
  .input-wrap .input-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    font-size:16px; opacity:.5; pointer-events:none;
  }
  .input-box {
    width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
    border-radius:14px; padding:13px 14px 13px 42px; font-size:15px; color:#fff;
    transition:border-color .2s,background .2s,box-shadow .2s;
    font-family:inherit; outline:none;
  }
  .input-box:focus {
    border-color:rgba(124,108,240,.7); background:rgba(255,255,255,.12);
    box-shadow:0 0 0 3px rgba(124,108,240,.2);
  }
  .input-box::placeholder { color:rgba(255,255,255,.3); }

  /* PICKER */
  .picker-box {
    width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
    border-radius:14px; padding:13px 14px; font-size:15px; color:#fff;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; user-select:none;
    transition:background .2s;
  }
  .picker-box:active { background:rgba(255,255,255,.14); }
  .picker-box .ph { color:rgba(255,255,255,.3); }
  .picker-box .val { color:#fff; font-weight:600; }
  .picker-box .icon { font-size:16px; opacity:.6; }

  /* SUBMIT */
  .btn-submit {
    width:100%; padding:15px; border:none; border-radius:14px;
    background:linear-gradient(135deg,rgba(124,108,240,.95),rgba(91,141,239,.95));
    color:#fff; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit;
    box-shadow:0 8px 24px rgba(124,108,240,.5),inset 0 1px 0 rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.2); transition:transform .12s,box-shadow .12s;
  }
  .btn-submit:active { transform:scale(.97); }
  .btn-submit:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* SECTION */
  .section-title {
    font-size:12px; font-weight:800; color:rgba(255,255,255,.45);
    margin:22px 2px 12px; display:flex; align-items:center; gap:8px;
    text-transform:uppercase; letter-spacing:.5px;
  }
  .section-title .count {
    background:rgba(124,108,240,.3); border:1px solid rgba(124,108,240,.45);
    color:rgba(255,255,255,.85); font-size:11px; font-weight:800;
    border-radius:20px; padding:2px 9px;
  }
  .section-title .past-count {
    background:rgba(220,50,70,.25); border:1px solid rgba(220,50,70,.4); color:#ff8098;
  }
  .btn-past {
    margin-right:auto; border:none;
    background:rgba(220,50,70,.18); border:1px solid rgba(220,50,70,.35);
    color:#ff8098; font-size:12px; font-weight:800; border-radius:20px;
    padding:5px 12px; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:6px; transition:background .15s;
  }
  .btn-past:active { background:rgba(220,50,70,.35); }
  .btn-delete-all {
    border:none; background:rgba(220,50,70,.18); border:1px solid rgba(220,50,70,.35);
    color:#ff8098; font-size:12px; font-weight:700; border-radius:12px;
    padding:7px 14px; cursor:pointer; font-family:inherit; transition:background .15s;
  }
  .btn-delete-all:active { background:rgba(220,50,70,.35); }

  /* REMINDER ITEMS */
  .reminder-item {
    border-radius:13px; padding:5px 9px; margin-bottom:5px;
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    display:flex; align-items:center; gap:8px;
    animation:slideIn .28s ease; transition:border-color .4s, background .4s, box-shadow .4s;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)} }

  /* COLOR THEMES */
  .theme-green {
    background:rgba(20,180,100,.1); border:1px solid rgba(20,220,120,.25);
    box-shadow:0 4px 14px rgba(0,0,0,.18),0 0 0 1px rgba(20,220,120,.08) inset;
  }
  .theme-yellow {
    background:rgba(240,180,30,.1); border:1px solid rgba(255,210,50,.3);
    box-shadow:0 4px 14px rgba(0,0,0,.18),0 0 0 1px rgba(255,210,50,.1) inset;
  }
  .theme-red {
    background:rgba(220,50,70,.12); border:1px solid rgba(255,80,100,.3);
    box-shadow:0 4px 14px rgba(220,50,70,.15),0 0 0 1px rgba(255,80,100,.1) inset;
  }

  .bullet-green { background:linear-gradient(135deg,rgba(20,200,100,.8),rgba(50,220,150,.8)); }
  .bullet-yellow { background:linear-gradient(135deg,rgba(240,180,20,.8),rgba(255,220,60,.8)); }
  .bullet-red { background:linear-gradient(135deg,rgba(220,50,70,.8),rgba(255,90,110,.8)); }

  .reminder-item .bullet {
    width:32px; height:32px; min-width:32px; border-radius:10px;
    border:1px solid rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center; font-size:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .reminder-item .content { flex:1; min-width:0; text-align:center; }
  .reminder-item .title { font-size:13.5px; font-weight:800; color:#fff; margin:0 0 1px; word-break:break-word; line-height:1.2; }
  .reminder-item .meta {
    font-size:12px; color:rgba(255,255,255,.75); font-weight:700;
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:0 0 1px;
    line-height:1.2;
  }
  .reminder-item .meta span { display:flex; align-items:center; gap:3px; }
  .reminder-item .meta-created { font-size:10px; color:rgba(255,255,255,.28); text-align:center; margin:0; line-height:1.2; }
  .badge-countdown {
    display:inline-block; font-size:10.5px; font-weight:700; border-radius:7px;
    padding:1px 7px; margin:1px 0 1px;
  }
  .badge-green { background:rgba(20,200,100,.2); color:#5effa0; border:1px solid rgba(20,200,100,.35); }
  .badge-yellow { background:rgba(240,180,20,.2); color:#ffd84f; border:1px solid rgba(240,180,20,.35); }
  .badge-red { background:rgba(220,50,70,.25); color:#ff8098; border:1px solid rgba(220,50,70,.4); }

  .reminder-item .actions { display:flex; flex-direction:column; gap:5px; align-items:center; }
  .reminder-item .del {
    border:none; background:rgba(224,85,107,.2); color:#ff6b8a;
    width:28px; height:28px; border-radius:9px; font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(224,85,107,.3); transition:background .15s;
  }
  .reminder-item .del:active { background:rgba(224,85,107,.4); }
  .reminder-item .edit {
    border:none; background:rgba(124,108,240,.2); color:#b8aaff;
    width:28px; height:28px; border-radius:9px; font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(124,108,240,.3); transition:background .15s;
  }
  .reminder-item .edit:active { background:rgba(124,108,240,.4); }

  /* EMPTY */
  .empty-state { text-align:center; padding:40px 10px; color:rgba(255,255,255,.3); font-size:13.5px; }
  .empty-state .em { font-size:40px; margin-bottom:10px; display:block; }

  /* MODAL BASE */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(5,5,20,.6);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:none; align-items:flex-end; justify-content:center; z-index:1000;
  }
  .modal-overlay.show { display:flex; }
  .edit-modal-overlay {
    position:fixed; inset:0; background:rgba(5,5,20,.6);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:none; align-items:center; justify-content:center;
    z-index:1000; padding:20px;
  }
  .edit-modal-overlay.show { display:flex; }
  .edit-modal-sheet {
    background:rgba(18,15,40,.92);
    backdrop-filter:blur(30px) saturate(200%);
    -webkit-backdrop-filter:blur(30px) saturate(200%);
    border:1px solid rgba(255,255,255,.14);
    width:100%; max-width:380px; border-radius:24px;
    padding:18px 18px 22px;
    animation:popIn .28s cubic-bezier(.34,1.26,.64,1);
    overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
  }
  .modal-sheet, .edit-modal-sheet {
    background:rgba(18,15,40,.88);
    backdrop-filter:blur(30px) saturate(200%);
    -webkit-backdrop-filter:blur(30px) saturate(200%);
    border:1px solid rgba(255,255,255,.14); border-bottom:none;
    width:100%; max-width:480px; border-radius:26px 26px 0 0;
    padding:16px 16px calc(20px + env(safe-area-inset-bottom));
    animation:sheetUp .28s cubic-bezier(.34,1.26,.64,1);
    max-height:88vh; overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 -20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
  }
  @keyframes sheetUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
  .modal-handle { width:36px; height:4px; background:rgba(255,255,255,.2); border-radius:3px; margin:0 auto 14px; }
  .modal-title {
    text-align:center; font-weight:800; font-size:16px; color:#fff; margin-bottom:16px;
    background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  /* CALENDAR */
  .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-nav button {
    width:36px; height:36px; border-radius:10px; border:none;
    background:rgba(124,108,240,.25); border:1px solid rgba(124,108,240,.4);
    color:#b8aaff; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .15s;
  }
  .cal-nav button:active { background:rgba(124,108,240,.45); }
  .cal-nav .cal-ym { display:flex; gap:6px; }
  .cal-nav select {
    border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.1);
    border-radius:10px; padding:8px 10px; font-size:14px;
    font-weight:700; color:#fff; font-family:inherit; outline:none;
  }
  .cal-nav select option { background:#1a1030; color:#fff; }
  .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:6px; }
  .cal-weekdays span { font-size:11px; font-weight:700; color:rgba(255,255,255,.35); padding:4px 0; }
  .cal-days { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; overflow-y:auto; }
  .cal-day {
    aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
    border-radius:11px; font-size:14px; cursor:pointer;
    color:rgba(255,255,255,.8); font-weight:600; position:relative; transition:background .15s;
  }
  .cal-day.empty { visibility:hidden; }
  .cal-day:active { background:rgba(255,255,255,.1); }
  .cal-day.today { color:#b8aaff; font-weight:800; }
  .cal-day.today::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; border-radius:50%; background:#b8aaff; }
  .cal-day.selected {
    background:linear-gradient(135deg,rgba(124,108,240,.9),rgba(91,141,239,.9)); color:#fff;
    box-shadow:0 4px 12px rgba(124,108,240,.5),inset 0 1px 0 rgba(255,255,255,.2);
  }
  .cal-day.selected::after { display:none; }
  .cal-day.friday { color:#ff8fa3; }
  .cal-day.selected.friday { color:#fff; }
  .modal-actions { display:flex; gap:10px; margin-top:14px; }
  .modal-actions button {
    flex:1; border:none; border-radius:14px; padding:13px; font-size:14.5px; font-weight:700;
    font-family:inherit; cursor:pointer; transition:transform .12s;
  }
  .modal-actions button:active { transform:scale(.97); }
  .modal-actions .cancel { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.6); }
  .modal-actions .confirm {
    background:linear-gradient(135deg,rgba(124,108,240,.95),rgba(91,141,239,.95));
    border:1px solid rgba(255,255,255,.2); color:#fff;
    box-shadow:0 6px 18px rgba(124,108,240,.4),inset 0 1px 0 rgba(255,255,255,.2);
  }
  .modal-actions .confirm:disabled { opacity:.35; }

  /* TIME WHEEL */
  .wheel-wrap { display:flex; justify-content:center; align-items:center; gap:4px; padding:6px 0 4px; position:relative; }
  .wheel-col { position:relative; width:84px; height:220px; overflow:hidden; }
  .wheel-col .fade-top,.wheel-col .fade-bottom { position:absolute; left:0; right:0; height:72px; z-index:2; pointer-events:none; }
  .wheel-col .fade-top { top:0; background:linear-gradient(to bottom,rgba(18,15,40,.95),rgba(18,15,40,0)); }
  .wheel-col .fade-bottom { bottom:0; background:linear-gradient(to top,rgba(18,15,40,.95),rgba(18,15,40,0)); }
  .wheel-center-line {
    position:absolute; top:50%; height:44px; transform:translateY(-50%);
    left:calc(50% - 94px); right:calc(50% - 94px);
    background:rgba(124,108,240,.15); border:1px solid rgba(124,108,240,.35);
    border-radius:14px; z-index:1; pointer-events:none;
  }
  .wheel-scroll {
    height:100%; overflow-y:scroll; scroll-snap-type:y mandatory;
    -ms-overflow-style:none; scrollbar-width:none; position:relative; z-index:2;
  }
  .wheel-scroll::-webkit-scrollbar { display:none; }
  .wheel-item {
    height:44px; display:flex; align-items:center; justify-content:center;
    scroll-snap-align:center; font-size:19px; color:rgba(255,255,255,.22); font-weight:600;
    transition:color .15s,font-size .15s; font-variant-numeric:tabular-nums;
  }
  .wheel-item.center { color:#fff; font-weight:800; font-size:24px; }
  .wheel-sep { display:flex; align-items:center; font-size:24px; font-weight:800; color:rgba(255,255,255,.6); margin:0 2px; }
  .time-preview { text-align:center; font-size:13px; color:rgba(255,255,255,.35); margin-top:8px; }
  .wheel-label { text-align:center; font-size:11px; font-weight:700; color:rgba(255,255,255,.3); margin-top:4px; letter-spacing:.4px; }

  /* EDIT MODAL */
  .edit-section-title { font-size:12px; font-weight:700; color:rgba(255,255,255,.45); margin-bottom:8px; }
  .edit-picker-row {
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
    width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
    border-radius:14px; padding:13px 14px; font-size:15px;
    color:#fff; font-family:inherit; margin-bottom:14px; transition:background .15s;
  }
  .edit-picker-row:active { background:rgba(255,255,255,.14); }
  .edit-picker-row .val { color:#fff; font-weight:600; }
  .edit-picker-row .icon { font-size:16px; opacity:.6; }
  .edit-reminder-title-box {
    font-size:14px; color:#fff; font-weight:700;
    background:rgba(124,108,240,.2); border:1px solid rgba(124,108,240,.3);
    border-radius:12px; padding:10px 14px; margin-bottom:16px; text-align:center;
  }

  /* ALERT POPUP */
  .alert-popup {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:3000; pointer-events:none;
    background:rgba(5,3,18,.35);
    backdrop-filter:blur(12px) saturate(160%);
    -webkit-backdrop-filter:blur(12px) saturate(160%);
    opacity:0; transition:opacity .3s;
  }
  .alert-popup.active { opacity:1; pointer-events:none; }
  .alert-popup-inner {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(40px) saturate(200%); -webkit-backdrop-filter:blur(40px) saturate(200%);
    border-radius:26px; padding:28px 32px; text-align:center; max-width:300px; width:90%;
    box-shadow:0 24px 70px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
    opacity:0; transform:scale(.82) translateY(10px);
    transition:opacity .35s cubic-bezier(.34,1.26,.64,1),transform .35s cubic-bezier(.34,1.26,.64,1);
  }
  .alert-popup-inner.show { opacity:1; transform:scale(1) translateY(0); }
  .alert-popup-inner.type-due { border:1px solid rgba(255,80,100,.45); }
  .alert-popup-inner.type-1h { border:1px solid rgba(255,210,50,.38); }
  .alert-popup-inner.type-5m { border:1px solid rgba(255,150,50,.42); }
  .alert-icon { font-size:44px; margin-bottom:12px; display:block; }
  .alert-title { font-size:15px; font-weight:800; color:#fff; margin-bottom:6px; }
  .alert-task { font-size:14px; color:rgba(255,255,255,.75); margin-bottom:10px; font-weight:600; line-height:1.4; }
  .alert-sub { font-size:12.5px; color:rgba(255,255,255,.45); }
  .alert-time-badge {
    display:inline-block; font-size:18px; font-weight:800; margin:8px 0 4px;
    padding:4px 16px; border-radius:12px;
  }
  .badge-due { background:rgba(220,50,70,.25); color:#ff8098; border:1px solid rgba(220,50,70,.4); }
  .badge-warn-1h { background:rgba(240,180,20,.2); color:#ffd84f; border:1px solid rgba(240,180,20,.35); }
  .badge-warn-5m { background:rgba(255,140,30,.2); color:#ffb347; border:1px solid rgba(255,140,30,.35); }

  /* TOAST */
  .confirm-overlay {
    position:fixed; inset:0; background:rgba(5,5,20,.65);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    display:none; align-items:center; justify-content:center;
    z-index:2000; padding:20px;
  }
  .confirm-overlay.show { display:flex; }
  .confirm-dialog {
    background:rgba(18,15,40,.92);
    backdrop-filter:blur(30px) saturate(200%); -webkit-backdrop-filter:blur(30px) saturate(200%);
    border:1px solid rgba(255,255,255,.14);
    border-radius:22px; padding:20px 20px 20px;
    width:100%; max-width:320px;
    box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
    animation:popIn .25s cubic-bezier(.34,1.26,.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)} }

  /* TOAST */
  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(18,15,40,.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.14); color:#fff; padding:12px 22px;
    border-radius:16px; font-size:13.5px; opacity:0; transition:opacity .25s,transform .25s;
    z-index:2000; display:flex; align-items:center; gap:8px;
    box-shadow:0 12px 32px rgba(0,0,0,.4); max-width:90vw;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<script>
/* ====== Helpers ====== */
const faDigits=['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
function toFa(n){return String(n).replace(/\d/g,d=>faDigits[d]);}
function pad2(n){return n<10?'0'+n:''+n;}

/* ====== Jalali ====== */
function div(a,b){return Math.floor(a/b);}
function mod(a,b){return a-Math.floor(a/b)*b;}
function g2d(gy,gm,gd){const a=Math.floor((14-gm)/12),y2=gy+4800-a,m2=gm+12*a-3;return gd+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}
function d2g(jdn){let a=jdn+32044,b=Math.floor((4*a+3)/146097),c=a-Math.floor(146097*b/4),d=Math.floor((4*c+3)/1461),e=c-Math.floor(1461*d/4),m=Math.floor((5*e+2)/153);return{gy:100*b+d-4800+Math.floor(m/10),gm:m+3-12*Math.floor(m/10),gd:e-Math.floor((153*m+2)/5)+1};}
function jalCal(jy){const breaks=[-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178];let bl=breaks.length,gy=jy+621,leapJ=-14,jp=breaks[0],jm,jump,leap,n,i;if(jy<jp||jy>=breaks[bl-1])throw new Error('');for(i=1;i<bl;i++){jm=breaks[i];jump=jm-jp;if(jy<jm)break;leapJ+=div(jump,33)*8+div(mod(jump,33),4);jp=jm;}n=jy-jp;leapJ+=div(n,33)*8+div(mod(n,33)+3,4);if(mod(jump,33)===4&&(jump-n)===4)leapJ+=1;const leapG=div(gy,4)-div((div(gy,100)+1)*3,4)-150,march=20+leapJ-leapG;if((jump-n)<6)n=n-jump+div(jump+4,33)*33;leap=mod(mod(n+1,33)-1,4);if(leap===-1)leap=4;return{leap,gy,march};}
function j2d(jy,jm,jd){const r=jalCal(jy);return g2d(r.gy,3,r.march)+(jm-1)*31-div(jm,7)*(jm-7)+jd-1;}
function d2j(jdn){let jy=d2g(jdn).gy-621+1,r,jdn1f;do{jy--;r=jalCal(jy);jdn1f=g2d(jy+621,3,r.march);}while(jdn1f>jdn);let k=jdn-jdn1f,jm,jd;if(k<=185){jm=1+div(k,31);jd=mod(k,31)+1;}else{k-=186;jm=7+div(k,30);jd=mod(k,30)+1;}return{jy,jm,jd};}
function gregorianToJalali(gy,gm,gd){return d2j(g2d(gy,gm,gd));}
function jalaliToGregorian(jy,jm,jd){return d2g(j2d(jy,jm,jd));}
function isLeapJalaliYear(jy){return jalCal(jy).leap===0;}
function jalaliMonthLength(jy,jm){if(jm<=6)return 31;if(jm<=11)return 30;return isLeapJalaliYear(jy)?30:29;}
const monthNames=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
function getTodayJalali(){const n=new Date();return gregorianToJalali(n.getFullYear(),n.getMonth()+1,n.getDate());}
function jalaliWeekdayIndex(jy,jm,jd){const g=jalaliToGregorian(jy,jm,jd);return(new Date(g.gy,g.gm-1,g.gd).getDay()+1)%7;}

/* ====== App State ====== */
const todayJ=getTodayJalali();
let calViewYear=todayJ.jy,calViewMonth=todayJ.jm;
let selectedDate=null,selectedTime=null,tempSelectedDate=null;
let reminders=[];

const dateBox=document.getElementById('dateBox'),dateBoxText=document.getElementById('dateBoxText');
const timeBox=document.getElementById('timeBox'),timeBoxText=document.getElementById('timeBoxText');
const submitBtn=document.getElementById('submitBtn'),taskTitleInput=document.getElementById('taskTitle');
const listEl=document.getElementById('list'),itemCountEl=document.getElementById('itemCount');
const toastEl=document.getElementById('toast');

function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1800);}
function updateSubmitState(){submitBtn.disabled=!(taskTitleInput.value.trim()&&selectedDate&&selectedTime);}
taskTitleInput.addEventListener('input',updateSubmitState);

/* ====== Reminder datetime ====== */
function getReminderDt(r){
  if(!r._date||!r._time)return null;
  const g=jalaliToGregorian(r._date.jy,r._date.jm,r._date.jd);
  return new Date(g.gy,g.gm-1,g.gd,r._time.h,r._time.m,0,0);
}
function getDiffMin(r){
  const dt=getReminderDt(r);if(!dt)return Infinity;
  return(dt.getTime()-Date.now())/60000;
}
function getTheme(diffMin){
  if(diffMin>60)return'green';
  if(diffMin>0)return'yellow';
  return'red';
}
function getCountdownText(diffMin){
  if(diffMin<=-1440)return`${toFa(Math.floor(-diffMin/1440))} روز گذشته`;
  if(diffMin<=-60)return`${toFa(Math.floor(-diffMin/60))} ساعت گذشته`;
  if(diffMin<0)return`${toFa(Math.floor(-diffMin))} دقیقه گذشته`;
  if(diffMin<1)return'همین الان!';
  if(diffMin<60)return`${toFa(Math.floor(diffMin))} دقیقه دیگر`;
  if(diffMin<1440)return`${toFa(Math.floor(diffMin/60))} ساعت و ${toFa(Math.floor(diffMin%60))} دقیقه دیگر`;
  return`${toFa(Math.floor(diffMin/1440))} روز دیگر`;
}

/* ====== Calendar ====== */
function populateSelects(mSel,ySel){
  mSel.innerHTML=monthNames.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
  let o='';for(let y=todayJ.jy+5;y>=todayJ.jy-5;y--)o+=`<option value="${y}">${toFa(y)}</option>`;
  ySel.innerHTML=o;
}
populateSelects(document.getElementById('calMonthSel'),document.getElementById('calYearSel'));

function renderCal(vY,vM,tempSel,daysEl,confirmBtn,onSelect){
  const firstDow=jalaliWeekdayIndex(vY,vM,1),len=jalaliMonthLength(vY,vM);
  let html='';
  for(let i=0;i<firstDow;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=len;d++){
    const dow=jalaliWeekdayIndex(vY,vM,d);
    const isFri=dow===6,isToday=(vY===todayJ.jy&&vM===todayJ.jm&&d===todayJ.jd);
    const isSel=tempSel&&tempSel.jy===vY&&tempSel.jm===vM&&tempSel.jd===d;
    let cls='cal-day';if(isFri)cls+=' friday';if(isToday)cls+=' today';if(isSel)cls+=' selected';
    html+=`<div class="${cls}" data-d="${d}">${toFa(d)}</div>`;
  }
  daysEl.innerHTML=html;
  daysEl.querySelectorAll('.cal-day:not(.empty)').forEach(el=>{
    el.addEventListener('click',()=>{onSelect({jy:vY,jm:vM,jd:parseInt(el.dataset.d,10)});confirmBtn.disabled=false;});
  });
}

/* Main calendar */
const calOverlay=document.getElementById('calOverlay');
const calMonthSel=document.getElementById('calMonthSel'),calYearSel=document.getElementById('calYearSel');
const calDays=document.getElementById('calDays'),calPrev=document.getElementById('calPrev'),calNext=document.getElementById('calNext');
const calCancel=document.getElementById('calCancel'),calConfirm=document.getElementById('calConfirm');

function reRenderCal(){
  calMonthSel.value=calViewMonth;calYearSel.value=calViewYear;
  renderCal(calViewYear,calViewMonth,tempSelectedDate,calDays,calConfirm,(sel)=>{tempSelectedDate=sel;reRenderCal();});
}
dateBox.addEventListener('click',()=>{
  tempSelectedDate=selectedDate?{...selectedDate}:null;
  calViewYear=selectedDate?selectedDate.jy:todayJ.jy;calViewMonth=selectedDate?selectedDate.jm:todayJ.jm;
  calConfirm.disabled=!tempSelectedDate;reRenderCal();calOverlay.classList.add('show');
});
calCancel.addEventListener('click',()=>calOverlay.classList.remove('show'));
calOverlay.addEventListener('click',(e)=>{if(e.target===calOverlay)calOverlay.classList.remove('show');});
calPrev.addEventListener('click',()=>{calViewMonth--;if(calViewMonth<1){calViewMonth=12;calViewYear--;}reRenderCal();});
calNext.addEventListener('click',()=>{calViewMonth++;if(calViewMonth>12){calViewMonth=1;calViewYear++;}reRenderCal();});
calMonthSel.addEventListener('change',()=>{calViewMonth=parseInt(calMonthSel.value,10);reRenderCal();});
calYearSel.addEventListener('change',()=>{calViewYear=parseInt(calYearSel.value,10);reRenderCal();});
calConfirm.addEventListener('click',()=>{
  if(!tempSelectedDate)return;
  selectedDate={...tempSelectedDate};
  dateBoxText.textContent=`${toFa(selectedDate.jd)} ${monthNames[selectedDate.jm-1]} ${toFa(selectedDate.jy)}`;
  dateBoxText.classList.remove('ph');dateBoxText.classList.add('val');
  calOverlay.classList.remove('show');updateSubmitState();
});

/* ====== Time Wheel ====== */
const ITEM_H=44;
function buildWheel(c,count){
  let h=`<div style="height:${ITEM_H*2}px"></div>`;
  for(let i=0;i<count;i++)h+=`<div class="wheel-item" data-v="${i}">${toFa(pad2(i))}</div>`;
  h+=`<div style="height:${ITEM_H*2}px"></div>`;c.innerHTML=h;
}
function getWheelVal(c){return Math.round(c.scrollTop/ITEM_H);}
function setWheelVal(c,v,smooth){c.scrollTo({top:v*ITEM_H,behavior:smooth?'smooth':'auto'});}
function highlightCenter(c){
  const idx=getWheelVal(c);
  c.querySelectorAll('.wheel-item').forEach(el=>el.classList.toggle('center',parseInt(el.dataset.v,10)===idx));
  return idx;
}
function makeWheelPair(hW,mW,preview){
  buildWheel(hW,24);buildWheel(mW,60);
  function upd(){const h=highlightCenter(hW),m=highlightCenter(mW);preview.textContent=`${toFa(pad2(h))}:${toFa(pad2(m))}`;return{h,m};}
  let timer;
  function onScroll(){upd();clearTimeout(timer);timer=setTimeout(()=>{setWheelVal(hW,Math.max(0,Math.min(23,Math.round(hW.scrollTop/ITEM_H))),true);setWheelVal(mW,Math.max(0,Math.min(59,Math.round(mW.scrollTop/ITEM_H))),true);upd();},120);}
  hW.addEventListener('scroll',onScroll);mW.addEventListener('scroll',onScroll);
  hW.addEventListener('click',(e)=>{const it=e.target.closest('.wheel-item');if(it)setWheelVal(hW,parseInt(it.dataset.v,10),true);});
  mW.addEventListener('click',(e)=>{const it=e.target.closest('.wheel-item');if(it)setWheelVal(mW,parseInt(it.dataset.v,10),true);});
  return{upd,setH:(v,s)=>setWheelVal(hW,v,s),setM:(v,s)=>setWheelVal(mW,v,s),getH:()=>Math.max(0,Math.min(23,Math.round(hW.scrollTop/ITEM_H))),getM:()=>Math.max(0,Math.min(59,Math.round(mW.scrollTop/ITEM_H)))};
}
const timeOverlay=document.getElementById('timeOverlay');
const hourWheel=document.getElementById('hourWheel'),minWheel=document.getElementById('minWheel');
const timePreview=document.getElementById('timePreview');
const mainWheel=makeWheelPair(hourWheel,minWheel,timePreview);

timeBox.addEventListener('click',()=>{

/* ====== Reminders ====== */
function loadReminders(){try{const r=localStorage.getItem('reminders_v1');reminders=r?JSON.parse(r):[];}catch(e){reminders=[];}}
function saveReminders(){try{localStorage.setItem('reminders_v1',JSON.stringify(reminders));}catch(e){}}
let pastReminders=[];
function loadPast(){try{const r=localStorage.getItem('past_reminders_v1');pastReminders=r?JSON.parse(r):[];}catch(e){pastReminders=[];}}
function savePast(){try{localStorage.setItem('past_reminders_v1',JSON.stringify(pastReminders));}catch(e){}}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function formatCreatedAt(ts){
  if(!ts)return'';
  const d=new Date(ts);
  const j=gregorianToJalali(d.getFullYear(),d.getMonth()+1,d.getDate());
  return`${toFa(j.jd)} ${monthNames[j.jm-1]} ${toFa(j.jy)}  ${toFa(pad2(d.getHours()))}:${toFa(pad2(d.getMinutes()))}`;
}

function buildReminderHTML(r, origIdx, showEdit=true){
  const diffMin=getDiffMin(r);
  const theme=getTheme(diffMin);
  const countdownTxt=getCountdownText(diffMin);
  const bulletEmoji=theme==='green'?'✅':theme==='yellow'?'⏳':'🔴';
  const editBtn=showEdit?`<button class="edit" data-idx="${origIdx}" title="ویرایش">✎</button>`:'';
  return`
  <div class="reminder-item theme-${theme}">
    <div class="bullet bullet-${theme}">${bulletEmoji}</div>
    <div class="content">
      <div class="title">${escapeHtml(r.title)}</div>
      <div class="meta">
        <span>📅 ${r.dateText}</span>
        <span>🕒 ${r.timeText}</span>
      </div>
      <div><span class="badge-countdown badge-${theme}">${countdownTxt}</span></div>
      <div class="meta-created">ثبت: ${formatCreatedAt(r.createdAt)}</div>
    </div>
    <div class="actions">
      <button class="del" data-idx="${origIdx}" title="حذف">✕</button>
      ${editBtn}
    </div>
  </div>`;
}

function moveDueToArchive(){
  const now=Date.now();
  const toMove=reminders.filter(r=>{
    const dt=getReminderDt(r);
    return dt&&dt.getTime()<=now;
  });
  if(toMove.length>0){
    // Only move ones not already in past
    toMove.forEach(r=>{
      const alreadyIn=pastReminders.some(p=>p.createdAt===r.createdAt);
      if(!alreadyIn) pastReminders.unshift({...r});
    });
    reminders=reminders.filter(r=>{const dt=getReminderDt(r);return !dt||dt.getTime()>now;});
    saveReminders();savePast();
    updatePastCount();
  }
}

function updatePastCount(){
  const pastCountEl=document.getElementById('pastCount');
  if(pastCountEl) pastCountEl.textContent=toFa(pastReminders.length);
}

function renderList(){
  moveDueToArchive();
  itemCountEl.textContent=toFa(reminders.length);
  updatePastCount();
  if(reminders.length===0){listEl.innerHTML=`<div class="empty-state"><span class="em">🗒️</span>هنوز یادآوری ثبت نشده</div>`;return;}

  const sorted=[...reminders.map((r,origIdx)=>({r,origIdx}))].sort((a,b)=>{
    const da=getReminderDt(a.r),db=getReminderDt(b.r);
    const ta=da?da.getTime():Infinity,tb=db?db.getTime():Infinity;
    return ta-tb;
  });

  listEl.innerHTML=sorted.map(({r,origIdx})=>buildReminderHTML(r,origIdx,true)).join('');

  listEl.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.idx,10);
      showConfirmDeleteReminder(idx);
    });
  });
  listEl.querySelectorAll('.edit').forEach(btn=>{
    btn.addEventListener('click',()=>openEditModal(parseInt(btn.dataset.idx,10)));
  });
}

/* ====== Past Modal ====== */
const pastOverlay=document.getElementById('pastOverlay');
const pastList=document.getElementById('pastList');
const pastClose=document.getElementById('pastClose');
const btnShowPast=document.getElementById('btnShowPast');

function renderPastList(){
  if(pastReminders.length===0){
    pastList.innerHTML=`<div class="empty-state"><span class="em">📭</span>هیچ کار گذشته‌ای وجود ندارد</div>`;
    return;
  }
  pastList.innerHTML=pastReminders.map((r,i)=>buildReminderHTML(r,i,false)).join('');
  pastList.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      pastReminders.splice(parseInt(btn.dataset.idx,10),1);
      savePast();updatePastCount();renderPastList();
    });
  });
}

btnShowPast.addEventListener('click',()=>{renderPastList();pastOverlay.classList.add('show');});
pastClose.addEventListener('click',()=>pastOverlay.classList.remove('show'));
pastOverlay.addEventListener('click',(e)=>{if(e.target===pastOverlay)pastOverlay.classList.remove('show');});

/* Delete Single Reminder Confirm */
let pendingDelIdx=-1;
const confirmDelReminderOverlay=document.getElementById('confirmDelReminderOverlay');
const confirmDelReminderText=document.getElementById('confirmDelReminderText');
function showConfirmDeleteReminder(idx){
  pendingDelIdx=idx;
  const title=reminders[idx]?reminders[idx].title:'';
  confirmDelReminderText.textContent=`«${title}» حذف شود؟`;
  confirmDelReminderOverlay.classList.add('show');
}
document.getElementById('confirmDelReminderCancel').addEventListener('click',()=>{
  confirmDelReminderOverlay.classList.remove('show');pendingDelIdx=-1;
});
confirmDelReminderOverlay.addEventListener('click',(e)=>{
  if(e.target===confirmDelReminderOverlay){confirmDelReminderOverlay.classList.remove('show');pendingDelIdx=-1;}
});
document.getElementById('confirmDelReminderOk').addEventListener('click',()=>{
  if(pendingDelIdx>=0){reminders.splice(pendingDelIdx,1);saveReminders();renderList();}
  confirmDelReminderOverlay.classList.remove('show');pendingDelIdx=-1;
  showToast('یادآور حذف شد 🗑');
});

/* Delete All Confirm */
const confirmDeleteAllOverlay=document.getElementById('confirmDeleteAllOverlay');
document.getElementById('deleteAllPastBtn').addEventListener('click',()=>confirmDeleteAllOverlay.classList.add('show'));
document.getElementById('confirmDeleteAllCancel').addEventListener('click',()=>confirmDeleteAllOverlay.classList.remove('show'));
confirmDeleteAllOverlay.addEventListener('click',(e)=>{if(e.target===confirmDeleteAllOverlay)confirmDeleteAllOverlay.classList.remove('show');});
document.getElementById('confirmDeleteAllOk').addEventListener('click',()=>{
  pastReminders=[];savePast();updatePastCount();renderPastList();
  confirmDeleteAllOverlay.classList.remove('show');
  showToast('همه کارهای گذشته حذف شدند 🗑');
});

/* ====== Submit ====== */
submitBtn.addEventListener('click',()=>{
  const title=taskTitleInput.value.trim();
  if(!title||!selectedDate||!selectedTime)return;
  reminders.push({
    title,
    dateText:`${toFa(selectedDate.jd)} ${monthNames[selectedDate.jm-1]} ${toFa(selectedDate.jy)}`,
    timeText:`${toFa(pad2(selectedTime.h))}:${toFa(pad2(selectedTime.m))}`,
    _date:{...selectedDate},_time:{...selectedTime},createdAt:Date.now()
  });
  saveReminders();renderList();
  taskTitleInput.value='';selectedDate=null;selectedTime=null;
  dateBoxText.textContent='انتخاب تاریخ';dateBoxText.classList.add('ph');dateBoxText.classList.remove('val');
  timeBoxText.textContent='انتخاب ساعت';timeBoxText.classList.add('ph');timeBoxText.classList.remove('val');
  updateSubmitState();showToast('یادآور ثبت شد ✅');
  taskTitleInput.blur();
  document.activeElement && document.activeElement.blur();
});

/* ====== Edit Modal ====== */
let editIdx=-1;
const editOverlay=document.getElementById('editOverlay');
const editReminderTitle=document.getElementById('editReminderTitle');
const editCancel=document.getElementById('editCancel'),editConfirm=document.getElementById('editConfirm');

function openEditModal(idx){
  editIdx=idx;const r=reminders[idx];
  editReminderTitle.textContent=r.title;
  editSelectedDate=r._date?{...r._date}:null;
  editSelectedTime=r._time?{...r._time}:null;
  document.getElementById('editDateBoxText').textContent=r.dateText;
  document.getElementById('editTimeBoxText').textContent=r.timeText;
  editOverlay.classList.add('show');
}
editCancel.addEventListener('click',()=>editOverlay.classList.remove('show'));
editOverlay.addEventListener('click',(e)=>{if(e.target===editOverlay)editOverlay.classList.remove('show');});
editConfirm.addEventListener('click',()=>{
  if(editIdx<0)return;const r=reminders[editIdx];
  if(editSelectedDate){r._date={...editSelectedDate};r.dateText=`${toFa(editSelectedDate.jd)} ${monthNames[editSelectedDate.jm-1]} ${toFa(editSelectedDate.jy)}`;}
  if(editSelectedTime){r._time={...editSelectedTime};r.timeText=`${toFa(pad2(editSelectedTime.h))}:${toFa(pad2(editSelectedTime.m))}`;}
  saveReminders();renderList();editOverlay.classList.remove('show');showToast('یادآور ویرایش شد ✏️');
});

/* ====== Alert Popup ====== */
const alertPopupInner=document.getElementById('alertPopupInner');
const alertIcon=document.getElementById('alertIcon');
const alertTitle=document.getElementById('alertTitle');
const alertTask=document.getElementById('alertTask');
const alertBadge=document.getElementById('alertBadge');
const alertSub=document.getElementById('alertSub');
let alertQueue=[],alertShowing=false;
const notifiedMap={};

/* ====== Audio ====== */
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  if(_audioCtx&&_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
// Unlock audio on first user interaction
['touchstart','mousedown','keydown'].forEach(evt=>{
  document.addEventListener(evt,()=>{ getAudioCtx(); },{once:true,passive:true});
});

function _ding(ctx,freq,startT,dur=0.28,vol=0.5){
  try{
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(freq,startT);
    gain.gain.setValueAtTime(vol,startT);
    gain.gain.exponentialRampToValueAtTime(0.001,startT+dur);
    osc.start(startT);osc.stop(startT+dur+0.01);
  }catch(e){}
}

function playDing(){
  const ctx=getAudioCtx();if(!ctx)return;
  const t=ctx.currentTime;
  _ding(ctx,880,t,0.35,0.45);
  _ding(ctx,1100,t+0.22,0.32,0.3);
}

function playDingDue(){
  const ctx=getAudioCtx();if(!ctx)return;
  const t=ctx.currentTime;
  const freqs=[1046,988,880,988,1046];
  freqs.forEach((f,i)=>_ding(ctx,f,t+i*0.32,0.26,0.55));
}

const alertPopupEl=document.getElementById('alertPopup');
function showAlertPopup(icon,title,task,badge,badgeClass,sub,type){
  alertQueue.push({icon,title,task,badge,badgeClass,sub,type});
  if(!alertShowing)processAlertQueue();
}
function processAlertQueue(){
  if(!alertQueue.length){alertShowing=false;alertPopupEl.classList.remove('active');return;}
  alertShowing=true;
  const {icon,title,task,badge,badgeClass,sub,type}=alertQueue.shift();
  alertIcon.textContent=icon;alertTitle.textContent=title;alertTask.textContent=task;
  alertBadge.textContent=badge;alertBadge.className='alert-time-badge '+badgeClass;alertSub.textContent=sub;
  alertPopupInner.className='alert-popup-inner type-'+type;
  alertPopupEl.classList.add('active');
  if(type==='due') playDingDue(); else playDing();
  requestAnimationFrame(()=>requestAnimationFrame(()=>alertPopupInner.classList.add('show')));
  setTimeout(()=>{
    alertPopupInner.classList.remove('show');
    setTimeout(()=>processAlertQueue(),400);
  },5000);
}

function checkReminders(){
  reminders.forEach(r=>{
    const dt=getReminderDt(r);if(!dt)return;
    const diffMin=(dt.getTime()-Date.now())/60000;
    const k=r.createdAt;

    // 1h warning (between 60~61 min)
    if(diffMin>59&&diffMin<=60&&!notifiedMap[k+'_1h']){
      notifiedMap[k+'_1h']=true;
      showAlertPopup('⚠️','یک ساعت مانده',`«${r.title}»`,'۶۰ دقیقه دیگر','badge-warn-1h','آماده شو!','1h');
    }
    // 5m warning (between 5~6 min)
    if(diffMin>4&&diffMin<=5&&!notifiedMap[k+'_5m']){
      notifiedMap[k+'_5m']=true;
      showAlertPopup('🔔','پنج دقیقه مانده',`«${r.title}»`,'۵ دقیقه دیگر','badge-warn-5m','حواست باشه!','5m');
    }
    // Due alert (between -1~0 min)
    if(diffMin>=-1&&diffMin<=0&&!notifiedMap[k+'_due']){
      notifiedMap[k+'_due']=true;
      showAlertPopup('🚨','وقت انجام کار رسید!',`«${r.title}»`,'همین الان!','badge-due','زمان شما فرا رسیده','due');
    }
  });
  // Refresh list colors
  renderList();
}

setInterval(checkReminders,15000);
checkReminders();

/* ====== Init ====== */
loadReminders();loadPast();renderList();updateSubmitState();

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
